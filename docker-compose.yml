
services:
  # ── Nginx: el servidor web ──────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

    # ── PHP-FPM: ejecuta Laravel ────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www
    depends_on:
      - mysql

    # ── MySQL: base de datos ────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: TurnosPro
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
